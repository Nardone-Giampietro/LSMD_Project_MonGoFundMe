spring.application.name=mongofundme
spring.profiles.active=local

# Spring configuration
spring.main.allow-circular-references=true
spring.data.mongodb.auto-index-creation=true

# Scheduler configuration
app.scheduler.enabled=true

# Campaign state transitions
app.scheduler.campaign-state-transition-cron=0 * * * * *

# Homepage recommendations
app.scheduler.homepage-recommendation-cron=2 * * * * *
app.scheduler.homepage-recommendation-summary-refresh-cron=4 * * * * *
app.scheduler.homepage-recommendation-lookback-days=14
app.scheduler.homepage-recommendation-limit=20

# Outbox processing
app.scheduler.outbox-processing-cron=12 * * * * *
app.scheduler.outbox-cleanup-cron=14 * * * * *
app.scheduler.outbox-cleanup-retention-days=1

# Graph campaign similarity
app.scheduler.campaign-similarity-refresh-cron=6 * * * * *
app.scheduler.campaign-similarity-top-k=20
app.scheduler.campaign-similarity-cutoff=0.05

# Administrator analytics materialized views
app.scheduler.organization-pending-reward-aging-refresh-cron=8 * * * * *
app.scheduler.organization-performance-ranking-refresh-cron=10 * * * * *

# Donor recommendations
app.recommendation.donor-campaign-limit=6
app.recommendation.donor-campaign-expiration-days=1
