spring.application.name=mongofundme
spring.profiles.active=local

# Spring configuration
spring.main.allow-circular-references=true
spring.data.mongodb.auto-index-creation=true

# Scheduler configuration
app.scheduler.enabled=true

# Campaign state transitions
app.scheduler.campaign-state-transition-cron=0 0 0 * * *

# Homepage recommendations
app.scheduler.homepage-recommendation-cron=0 30 0 * * *
app.scheduler.homepage-recommendation-summary-refresh-cron=0 */10 * * * *
app.scheduler.homepage-recommendation-lookback-days=14
app.scheduler.homepage-recommendation-limit=20

# Outbox processing
app.scheduler.outbox-processing-cron=0 */5 * * * *
app.scheduler.outbox-cleanup-cron=0 */30 * * * *
app.scheduler.outbox-cleanup-retention-days=1

# Graph campaign similarity
app.scheduler.campaign-similarity-refresh-cron=0 0 2 * * *
app.scheduler.campaign-similarity-top-k=20
app.scheduler.campaign-similarity-cutoff=0.05

# Administrator analytics materialized views
app.scheduler.organization-pending-reward-aging-refresh-cron=0 0 3 1/3 * *
app.scheduler.organization-performance-ranking-refresh-cron=0 15 3 1/3 * *

# Donor recommendations
app.recommendation.donor-campaign-limit=6
app.recommendation.donor-campaign-expiration-days=1
