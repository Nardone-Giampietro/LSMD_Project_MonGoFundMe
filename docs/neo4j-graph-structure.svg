<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1100" viewBox="0 0 1900 1100">
  <defs>
    <radialGradient id="donorGradient" cx="45%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="65%" stop-color="#E8F5FF"/>
      <stop offset="100%" stop-color="#D8ECFF"/>
    </radialGradient>
    <radialGradient id="campaignGradient" cx="45%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="65%" stop-color="#EDF9E7"/>
      <stop offset="100%" stop-color="#E0F3D8"/>
    </radialGradient>
    <radialGradient id="organizationGradient" cx="45%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="65%" stop-color="#F5ECFF"/>
      <stop offset="100%" stop-color="#E9D9FF"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="28" markerHeight="28" refX="26" refY="14" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 28 14 L 0 28 z" fill="#222222"/>
    </marker>
    <style>
      .node-title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 48px;
        font-weight: 700;
      }
      .attr {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 31px;
        fill: #111111;
      }
      .attr-small {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 27px;
        fill: #111111;
      }
      .relationship {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 34px;
        font-weight: 700;
        fill: #242424;
      }
      .relationship-small {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 31px;
        font-weight: 700;
        fill: #242424;
      }
      .callout-text {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 28px;
        fill: #111111;
      }
      .edge {
        stroke: #222222;
        stroke-width: 4.5;
        fill: none;
        marker-end: url(#arrow);
      }
      .callout-link {
        stroke: #222222;
        stroke-width: 3;
        stroke-dasharray: 9 9;
        fill: none;
      }
    </style>
  </defs>

  <rect width="1700" height="1100" fill="#FFFFFF"/>

  <path class="edge" d="M 1240 382 L 1240 470"/>
  <text class="relationship" x="1282" y="455">CREATED</text>

  <path class="edge" d="M 1020 695 L 435 695"/>
  <text class="relationship" x="610" y="650">DONATED_BY</text>
  <path class="callout-link" d="M 710 695 L 710 748"/>
  <rect x="465" y="748" width="555" height="95" rx="14" ry="14" fill="#FFFFFF" stroke="#222222" stroke-width="3"/>
  <text class="callout-text" x="505" y="807">
    <tspan font-weight="700">lastDonatedAt:</tspan>
    <tspan> LocalDateTime</tspan>
  </text>

  <path class="edge" d="M 1430 812 C 1740 835 1740 545 1430 568"/>
  <text class="relationship-small" x="1465" y="525">SIMILAR_CAMPAIGN</text>
  <path class="callout-link" d="M 1630 705 L 1630 835"/>
  <rect x="1515" y="835" width="315" height="88" rx="14" ry="14" fill="#FFFFFF" stroke="#222222" stroke-width="3"/>
  <text class="callout-text" x="1560" y="889">
    <tspan font-weight="700">score:</tspan>
    <tspan> Double</tspan>
  </text>

  <circle cx="250" cy="695" r="185" fill="url(#donorGradient)" stroke="#0A58A8" stroke-width="4" filter="url(#softShadow)"/>
  <text class="node-title" x="250" y="650" text-anchor="middle" fill="#073D78">Donor</text>
  <line x1="100" y1="678" x2="400" y2="678" stroke="#073D78" stroke-width="3"/>
  <text class="attr" x="250" y="742" text-anchor="middle">
    <tspan font-weight="700">id:</tspan>
    <tspan> String</tspan>
  </text>

  <circle cx="1240" cy="220" r="170" fill="url(#organizationGradient)" stroke="#542A94" stroke-width="4" filter="url(#softShadow)"/>
  <text class="node-title" x="1240" y="178" text-anchor="middle" fill="#542A94">Organization</text>
  <line x1="1087" y1="207" x2="1393" y2="207" stroke="#542A94" stroke-width="3"/>
  <text class="attr" x="1240" y="272" text-anchor="middle">
    <tspan font-weight="700">id:</tspan>
    <tspan> String</tspan>
  </text>

  <circle cx="1240" cy="695" r="220" fill="url(#campaignGradient)" stroke="#087A22" stroke-width="4" filter="url(#softShadow)"/>
  <text class="node-title" x="1240" y="610" text-anchor="middle" fill="#087A22">Campaign</text>
  <line x1="1075" y1="642" x2="1405" y2="642" stroke="#087A22" stroke-width="3"/>
  <text class="attr" x="1240" y="710" text-anchor="middle">
    <tspan font-weight="700">id:</tspan>
    <tspan> String</tspan>
  </text>
  <text class="attr" x="1240" y="757" text-anchor="middle">
    <tspan font-weight="700">title:</tspan>
    <tspan> String</tspan>
  </text>
  <text class="attr-small" x="1240" y="803" text-anchor="middle">
    <tspan font-weight="700">thumbnailImageUrl:</tspan>
    <tspan> String</tspan>
  </text>
  <text class="attr" x="1240" y="849" text-anchor="middle">
    <tspan font-weight="700">open:</tspan>
    <tspan> Boolean</tspan>
  </text>
</svg>
